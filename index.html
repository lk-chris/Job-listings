<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  
  <title>Frontend Mentor | Job Listings</title>
</head>
<body>
    <header>
      <picture>
        <source srcset="images\bg-header-mobile.svg" media="(max-width: 425px)">
        <img src="images\bg-header-desktop.svg" alt="A lovely bouquet of flowers">
      </picture>
    </header>

    <!-- JOB LISTING CARDS -->

    <section class="job-grid">
      <div class="job-card">
        <div class="lhs">
            <div class="img">
            <img src="/images/loop-studios.svg" alt="">
        </div>
        <div class="job-info">
            <div class="job-info-top">
            <p class="company-name">Photosnap</p>
            <button class="btn-new">NEW!</button>
            <button class="btn-featured">FEATURED</button>
            </div>
            <div class="job-info-mid">
            <p class="position">Senior Frontend Developer</p>
            </div>
            <div class="job-info-bottom">
            <p class="time-since-post">1d ago</p>
            <span></span>
            <p class="job-period">Full Time</p>
            <span></span>
            <p class="job-classification">USA only</p>
            </div>
        </div>
        </div>
        
        <div class="filter-items">
            <button class="filter-button">Frontend</button>
            <button class="filter-button">Senior</button>
            <button class="filter-button">HTML</button>
            <button class="filter-button">CSS</button>
        </div>
      </div>
    </section>
    <script src="index.js"></script>
</body>
</html>
